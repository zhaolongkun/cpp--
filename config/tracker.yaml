model:
  path: "D:/kun-data/kun-code-data/run/yolo12n/weights/best.pt"
  conf_detect: 0.6
  tile_enable: true
  tile_size: 960
  tile_overlap: 0.25
  tile_max_per_frame: 2
  tile_global_interval: 6
  tile_priority_enable: true
  tile_priority_topk: 1
  tile_priority_expand_ratio: 2.0
  tile_priority_ttl: 8
  use_shm_detector: true
  bbox_size_filter_enable: true
  bbox_size_filter_alpha: 0.5

camera:
  index: 0
  width: 640
  height: 480
  center_x: 320
  center_y: 240
  backend: "dshow"
  show_window: true
  show_coasting: false
  use_mjpg: false
  auto_focus_enable: true
  auto_zoom_enable: true
  target_bbox_ratio: 0.10
  bbox_ratio_alpha: 0.35
  zoom_persist_frames: 3
  zoom_step: 5.0
  zoom_min: 0
  zoom_max: 260
  show_zoom_debug: true
  zoom_area_deadband_px: 100
  zoom_hysteresis_ratio: 1.6
  zoom_action_interval_ms: 250
  zoom_stable_required_ms: 80
  zoom_median_window: 5
  zoom_search_step: 10.0
  zoom_search_every_n: 2
  zoom_max_lost_recover_enable: true
  zoom_max_lost_trigger_frames: 8
  zoom_recover_step: 15.0
  zoom_out_enable: false
  zoom_out_trigger_mult: 1.8
  zoom_hold_miss_frames: 10
  zoom_reacquire_freeze_frames: 6
  zoom_reacquire_confirm_frames: 3

mot:
  max_age: 15
  iou_gate: 0.25
  tracker_type: "bytetrack"   # bytetrack | botsort
  use_bytetrack: true         # backward compatibility
  track_high_thresh: 0.6
  track_low_thresh: 0.1
  new_track_thresh: 0.7
  second_match_iou: 0.15
  botsort_iou_weight: 0.75
  botsort_center_weight: 0.25
  botsort_max_center_dist_ratio: 0.55

control:
  rate_hz: 30
  deadband_px: 20
  cmd_limit: 80
  full_speed_px: 200
  slew_per_tick: 8
  pid_x: {kp: 0.04, ki: 0.0, kd: 0.02}
  pid_y: {kp: 0.018, ki: 0.0, kd: 0.02}
  stop_when_lost: true

actuator:
  mode: "pyusb"                 # mock | pyusb
  armed: true                   # safety interlock: must be true to send to hardware
  python_exe: "C:/Users/Administrator/miniconda3/envs/py310/python.exe"
  bridge_script: "tools/motor_usb_bridge.py"
  x_vendor_id: 1155             # 0x0483
  x_product_id: 22288           # 0x5710
  y_vendor_id: 1156             # 0x0484
  y_product_id: 22289           # 0x5711
  invert_x: false
  invert_y: false
  scale_x: 0.9
  scale_y: 1.0
  speed_limit: 80
  send_zero_on_close: true
  debug: true
  y_pitch_guard_enable: true             # 是否启用 Y 轴俯仰角安全保护
  y_pitch_port: "COM9"                   # 俯仰角串口号
  y_pitch_baud: 115200                   # 俯仰角串口波特率
  y_pitch_min_deg: -60.0                 # Y 轴允许的最小俯仰角，低于该值禁止继续向更小角度运动
  y_pitch_max_deg: 3.0                   # Y 轴允许的最大俯仰角，高于该值禁止继续向更大角度运动
  y_pitch_lpf_alpha: 0.20                # 俯仰角低通滤波系数，越大越跟随新值
  y_pitch_release_margin_deg: 0.0        # 保留参数，当前即时判定逻辑下不再用于预先锁定
  y_pitch_timeout_ms: 250                # 保留参数，当前不再用“超时即清零”策略
  y_pitch_debug: true                    # 是否输出俯仰角保护调试信息
  y_pitch_positive_increases_angle: false # 若为 true，Y 正向命令会让俯仰角增大；否则相反
  y_pitch_soft_zone_deg: 2.0             # 距离上下限多少度开始对越界方向做软减速
  y_pitch_jump_guard_enable: true        # 是否启用俯仰角突变降速保护
  y_pitch_max_step_deg: 4.0              # 相邻两次俯仰角变化超过该值时视为突变
  y_pitch_jump_speed_scale: 0.50         # 触发突变保护后，Y 命令缩放到原值的比例
  y_pitch_jump_speed_cap: 20.0           # 触发突变保护后，Y 命令的最大绝对值上限
  y_pitch_takeover_enable: true          # 上电后自动将俯仰角调到目标角度
  y_pitch_takeover_target_deg: -20.0     # takeover 目标角度，到达后交由检测框接手
  y_pitch_takeover_speed: 1.0            # takeover 阶段每次发送的速度值
  y_pitch_takeover_interval_ms: 35       # takeover 发送间隔(ms)
  y_pitch_session_idle_ms: 150           # 检测框命令超时时间(ms)

filter:
  enable: true
  neural_enable: true
  meas_only_when_matched: true
  switch_prob: 0.04
  gate_chi2: 9.21
  huber_c: 2.5
  q_pos: 180.0
  q_vel: 80.0
  q_acc: 25.0
  r_pos: 144.0
  alpha_q_min: 0.35
  alpha_q_max: 3.00
  alpha_r_min: 0.35
  alpha_r_max: 4.50
  bias_limit_px: 4.0
  outlier_prob_min: 0.05
  outlier_prob_max: 0.95
  offset_lpf_alpha_y: 0.15

temporal_comp:
  enable: true
  window_size: 10
  seq_len: 8
  alpha: 0.7
  delta_max: 10.0
  model_path: "模型-new2/checkpoints/causal_cnn_gru.onnx"
  stats_path: "模型-new2/checkpoints/stats.json"

log:
  enable: true
  path: "logs/tracker_log.csv"
  dedup_by_frame_id: true
  profile: "brief"
